<header class="w-full bg-gray-900 border-b border-white/10">
  <nav class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
    <div class="flex items-center gap-6">
      <h2 class="text-lg font-bold text-white">WeDoSoftware Task</h2>
      <div class="flex items-center gap-4">
        <a class="text-sm text-slate-300 hover:text-white transition" [routerLink]="['/']">Home</a>
        @if (authStore.isAuthenticated()) {
          <a class="text-sm text-slate-300 hover:text-white transition" [routerLink]="['/workouts']">
            Workouts
          </a>
        }
      </div>
    </div>

    <div class="flex items-center gap-4">
      @if (authStore.user(); as user) {
        <span class="hidden sm:inline text-sm text-slate-400">
          {{ user.name }} {{ user.surename }}
        </span>
        <button
          type="button"
          (click)="logout()"
          class="rounded-lg border border-white/10 px-3 py-1.5 text-sm text-slate-200 hover:bg-white/5 transition"
        >
          Logout
        </button>
      } @else {
        <span class="text-sm text-slate-500">Not signed in</span>
      }
    </div>
  </nav>
</header>
