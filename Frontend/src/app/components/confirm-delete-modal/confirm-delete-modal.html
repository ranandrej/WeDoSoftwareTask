@if (isOpen()) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center p-4"
    role="dialog"
    aria-modal="true"
    aria-labelledby="delete-modal-title"
  >
    <button
      type="button"
      class="absolute inset-0 bg-slate-950/70 backdrop-blur-sm"
      aria-label="Close dialog"
      (click)="onCancel()"
    ></button>

    <div class="relative w-full max-w-md rounded-2xl border border-white/10 bg-slate-900 p-6 shadow-2xl sm:p-8">
      <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-red-500/15">
        <svg class="h-6 w-6 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 9v4m0 4h.01M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"
          />
        </svg>
      </div>

      <h2 id="delete-modal-title" class="text-center text-xl font-bold text-white">
        Delete account?
      </h2>
      <p class="mt-3 text-center text-sm leading-relaxed text-slate-400">
        Are you sure you want to delete your account? This action is permanent and all your
        workouts will be removed.
      </p>

      <div class="mt-8 flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
        <button
          type="button"
          (click)="onCancel()"
          class="w-full rounded-lg border border-white/10 px-4 py-2.5 text-sm font-semibold text-slate-200 hover:bg-white/5 transition sm:w-auto"
        >
          No, keep account
        </button>
        <button
          type="button"
          (click)="onConfirm()"
          class="w-full rounded-lg bg-red-500 px-4 py-2.5 text-sm font-semibold text-white shadow-lg shadow-red-500/25 hover:bg-red-400 transition sm:w-auto"
        >
          Yes, delete account
        </button>
      </div>
    </div>
  </div>
}
